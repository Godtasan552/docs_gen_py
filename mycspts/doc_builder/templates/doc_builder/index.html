{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc Builder | Django</title>
    <link rel="stylesheet" href="{% static 'doc_builder/css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <style>
        .manual-add {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--card-border);
        }
        .field-count {
            font-size: 0.9rem;
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Doc Builder</h1>
            <p class="subtitle">ระบบสร้างเอกสารอัตโนมัติจากจุดไข่ปลา (Django Version)</p>
        </header>

        <main class="glass-panel">
            <section id="upload-section" class="fade-in">
                <div class="upload-zone" id="drop-zone">
                    <span class="upload-icon">📄</span>
                    <h3>วางไฟล์ Word (.docx) ที่นี่</h3>
                    <p class="text-muted">หรือคลิกเพื่อเลือกไฟล์</p>
                    <input type="file" id="file-input" accept=".docx" style="display: none;">
                </div>
            </section>

            <section id="form-container" class="fade-in" style="display: none;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <h2 style="font-size: 1.5rem;">ฟอร์มกรอกข้อมูล</h2>
                        <span id="stat-badge" class="field-count"></span>
                    </div>
                    <button class="btn" style="background: transparent; color: var(--text-muted); font-size: 0.9rem;" onclick="resetApp()">
                        <i class="bi bi-arrow-left"></i> เปลี่ยนไฟล์
                    </button>
                </div>

                <div id="dynamic-form" class="form-grid"></div>

                <div class="manual-add">
                    <input type="text" id="new-field-name" placeholder="ชื่อฟิลด์เพิ่มเติม..." style="flex: 1;">
                    <button class="btn" style="background: var(--card-border); color: white;" onclick="addManualField()">
                        <i class="bi bi-plus-lg"></i> เพิ่ม
                    </button>
                </div>

                <button id="submit-btn" class="btn btn-primary">
                    <span class="btn-text">สร้างเอกสารและส่งออก PDF</span>
                    <div class="loader" id="submit-loader"></div>
                </button>
            </section>

            <section id="results-container" class="fade-in" style="display: none;">
                <div style="font-size: 4rem; margin-bottom: 1rem; text-align: center;">✅</div>
                <h2 style="text-align: center;">ประมวลผลสำเร็จ!</h2>
                <div class="download-options">
                    <a id="pdf-download" href="#" class="btn btn-success" download>
                        <i class="bi bi-file-earmark-pdf"></i> ดาวน์โหลด PDF
                    </a>
                    <a id="json-download" href="#" class="btn btn-primary" style="background: #334155;" download>
                        <i class="bi bi-braces"></i> ดาวน์โหลด JSON
                    </a>
                </div>
                <div style="text-align: center;">
                    <button class="btn" style="margin-top: 2rem; background: transparent; border: 1px solid var(--card-border);" onclick="resetApp()">
                        ทำรายการใหม่
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script>
        let currentFilename = '';
        const csrftoken = document.querySelector('[name=csrf-token]').content;

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadSection = document.getElementById('upload-section');
        const formContainer = document.getElementById('form-container');
        const resultsContainer = document.getElementById('results-container');
        const dynamicForm = document.getElementById('dynamic-form');
        const submitBtn = document.getElementById('submit-btn');
        const submitLoader = document.getElementById('submit-loader');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { const file = e.target.files[0]; if (file) handleFileUpload(file); };

        async function handleFileUpload(file) {
            const formData = new FormData();
            formData.append('file', file);
            dropZone.innerHTML = '<div class="loader" style="display: block;"></div><p style="margin-top: 1rem;">กำลังวิเคราะห์โครงสร้างไฟล์...</p>';

            try {
                const response = await fetch('upload/', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': csrftoken },
                    body: formData
                });
                const result = await response.json();
                if (result.error) throw new Error(result.error);
                currentFilename = result.filename;
                renderForm(result.fields);
            } catch (err) {
                alert('Error: ' + err.message);
                resetApp();
            }
        }

        function renderForm(fields) {
            dynamicForm.innerHTML = '';
            document.getElementById('stat-badge').innerText = `พบ ${fields.length} ฟิลด์`;
            
            fields.forEach(field => {
                addFieldToUI(field);
            });
            
            uploadSection.style.display = 'none';
            formContainer.style.display = 'block';
        }

        function addFieldToUI(label) {
            const group = document.createElement('div');
            group.className = 'input-group fade-in';
            group.innerHTML = `<label>${label}</label><input type="text" name="${label}" placeholder="ระบุข้อมูล...">`;
            dynamicForm.appendChild(group);
        }

        function addManualField() {
            const nameInput = document.getElementById('new-field-name');
            const name = nameInput.value.trim();
            if (name) {
                addFieldToUI(name);
                nameInput.value = '';
                // Update Badge
                const count = dynamicForm.querySelectorAll('.input-group').length;
                document.getElementById('stat-badge').innerText = `รวม ${count} ฟิลด์`;
            }
        }

        submitBtn.onclick = async () => {
            const inputs = dynamicForm.querySelectorAll('input');
            const data = {};
            inputs.forEach(i => data[i.name] = i.value || ' ');

            submitBtn.disabled = true;
            document.querySelector('.btn-text').style.display = 'none';
            submitLoader.style.display = 'block';

            try {
                const response = await fetch('generate/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken 
                    },
                    body: JSON.stringify({ filename: currentFilename, formData: data })
                });
                const result = await response.json();
                if (result.error) throw new Error(result.error);
                document.getElementById('pdf-download').href = result.pdf_url;
                document.getElementById('json-download').href = result.json_url;
                formContainer.style.display = 'none';
                resultsContainer.style.display = 'block';
            } catch (err) {
                alert('Export Error: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                document.querySelector('.btn-text').style.display = 'block';
                submitLoader.style.display = 'none';
            }
        };

        function resetApp() {
            uploadSection.style.display = 'block';
            formContainer.style.display = 'none';
            resultsContainer.style.display = 'none';
            dropZone.innerHTML = '<span class="upload-icon">📄</span><h3>วางไฟล์ Word (.docx) ที่นี่</h3><p class="text-muted">หรือคลิกเพื่อเลือกไฟล์</p>';
        }
    </script>
</body>
</html>
